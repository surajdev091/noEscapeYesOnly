<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Will You Be Mine?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: pink;
      color: white;
      margin-top: 50px;
    }
    h1 {
      font-size: 2.5em;
    }
    .button {
      background: red;
      color: white;
      padding: 15px 30px;
      font-size: 1.2em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
    }
    .button:hover {
      background: darkred;
    }
    img {
      max-width: 300px;
      margin: 20px auto;
      display: block;
      border-radius: 15px;
    }
  </style>
</head>
<body>
  <h1 id="question">💖 Will you be mine? 💖</h1>
  <img height="400px" id="image" src="Snapchat-670047216.jpg" alt="Cute image">
  <div id="buttons">
    <button class="button" onclick="sayYes()">YES</button>
    <button class="button" onclick="sayNo()">NO</button>
  </div>

  <script>
    let step = 0;
    const questions = [
      "💖 Will you be mine? 💖",
      "Are you really sure? Think again 💕",
    
      "Come on, you know you want to 💘",
      "No escape! Say YES 😍",
      "Final chance… Say YES 💞"
    ];
    const images = [
      "https://placekitten.com/300/300",
    //   "https://placebear.com/300/300",
      "https://tse2.mm.bing.net/th/id/OIP.k2-oCUYoYZtNWl4esx0ZKwAAAA?rs=1&pid=ImgDetMain&o=7&rm=3",
    
    //   "https://place-puppy.com/300x300",
    "https://i.pinimg.com/originals/80/68/b4/8068b48cfd72613d134b4439b7ca19a0.jpg",
    //   "https://picsum.photos/300/300?random=1",
    "https://tse4.mm.bing.net/th/id/OIP.0ze1DN9alDn5leTtxShAzQAAAA?rs=1&pid=ImgDetMain&o=7&rm=3",
    //   "https://picsum.photos/300/300?random=2"
    "https://media1.tenor.com/m/lmA7VALYIAsAAAAd/sad-pikachu.gif",
  
    ];

    function sayYes() {
      document.body.innerHTML = "<h1>🎉 Yay! You said YES! 🎉</h1><img src='https://i.pinimg.com/originals/27/54/a3/2754a360577dbb23a55852b3ee5b9319.jpg'>";
    }

    function sayNo() {
     
              step++;
      if (step >= questions.length - 1) {
        // Last step: remove NO button
        document.getElementById("buttons").innerHTML = 
          "<button class='button' onclick='sayYes()'>YES</button>";
        document.getElementById("question").innerText = "Now only YES remains 💖";
        document.getElementById("image").src = images[images.length - 1];
      } else {
        document.getElementById("question").innerText = questions[step];
        document.getElementById("image").src = images[step];
      }
    

      
    }
  </script>
</body>
</html>
